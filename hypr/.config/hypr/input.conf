# Input configuration (shared) — sourced by hyprland.conf
input {
    kb_layout = us,il
    kb_options = compose:caps,grp:alt_shift_toggle
    follow_mouse = 1
    repeat_rate = 40
    repeat_delay = 600
    numlock_by_default = true
    touchpad {
        natural_scroll = false
        scroll_factor = 0.4
    }
}