# lenovo (Intel/1080p laptop) monitor setup — sourced by hyprland.conf
# eDP-1 (laptop) - primary at origin, native 1920x1080 (16:9 panel)
monitor = eDP-1, 1920x1080@60, 0x0, 1.3333
# External Dell - auto-placed to the right of the laptop when docked (can be DP-1 or DP-2)
monitor = desc:Dell Inc. DELL P2722H, 1920x1080@60, auto-right, 1
# Fallback for any other monitor
monitor = , preferred, auto, auto

# Workspace defaults
workspace = 1, monitor:eDP-1, default:true
workspace = 5, monitor:eDP-1, default:true