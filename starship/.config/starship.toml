## FIRST LINE/ROW: Info & Status
[username]
format = " [$user]($style)@"
show_always = false
disabled = true
style_root = "bold red"
style_user = "bold mauve"

[hostname]
disabled = true
format = "[$hostname]($style) in "
ssh_only = false
style = "bold maroon"
ssh_symbol = "¯¼ü "

[directory]
style = "bold peach"
truncate_to_repo = false
truncation_length = 0
truncation_symbol = "../"
read_only = "´æû"

[git_metrics]
disabled = false
added_style = 'bold green'
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[sudo]
disabled = false

[git_status]
ahead = "´àÂ${count}"
behind = "´àÁ${count}"
deleted = "x"
diverged = "´ü¢´àÂ${ahead_count}´àÁ${behind_count}"
style = "text"

[git_branch]
symbol = "´Éİ "
style = "bold green"

[nix_shell]
format = 'via [$symbol(($name))]($style) '
symbol = "´îô "

[cmd_duration]
disabled = false
style="bold flamingo"
format = "took [$duration]($style)"
show_milliseconds = true
show_notifications = true
min_time_to_notify = 30_000

## SECOND LINE/ROW: Prompt
[battery]
charging_symbol = "´ûâ"
disabled = true
discharging_symbol = "´ûé"
full_symbol = "´ò©"

[[battery.display]] # "bold red" style when capacity is between 0% and 15%
disabled = false
style = "bold red"
threshold = 15

[[battery.display]] # "bold peach" style when capacity is between 15% and 50%
disabled = true
style = "bold peach"
threshold = 50

[[battery.display]] # "bold green" style when capacity is between 50% and 90%
disabled = true
style = "bold green"
threshold = 90

[status]
disabled = false
format = '[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
map_symbol = true
pipestatus = true
symbol = "Ô£û"
not_executable_symbol = "´ëû"
not_found_symbol = "´Çé"
sigint_symbol = "¾░ş¥"
signal_symbol = "´âğ"

[os]
disabled = false
format = ' [$symbol]($style)'
style = "bold mauve"

[character]
error_symbol = ""
success_symbol = "ÔØ»(bold green)"

